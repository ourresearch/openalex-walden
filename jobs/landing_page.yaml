resources:
  jobs:
    LandingPageWork:
      name: LandingPageWork
      email_notifications:
        on_failure:
          - casey@ourresearch.org
      schedule:
        quartz_cron_expression: 56 0 9/8 * * ?
        timezone_id: UTC
        pause_status: UNPAUSED
      tasks:
        - task_key: Parseland
          notebook_task:
            notebook_path: notebooks/scraping/parseland
            source: GIT
          job_cluster_key: parseland_cluster
        - task_key: Landing_Page_Work
          depends_on:
            - task_key: Parseland
          pipeline_task:
            pipeline_id: ff5e63c2-b1b8-49c2-a7c0-2ee246e89e69
      job_clusters:
        - job_cluster_key: parseland_cluster
          new_cluster:
            cluster_name: ""
            spark_version: 16.4.x-scala2.13
            spark_conf:
              spark.master: local[*, 4]
              spark.databricks.cluster.profile: singleNode
            aws_attributes:
              first_on_demand: 1
              availability: SPOT_WITH_FALLBACK
              zone_id: us-east-1f
              spot_bid_price_percent: 100
            node_type_id: m5d.4xlarge
            driver_node_type_id: m5d.4xlarge
            custom_tags:
              ResourceClass: SingleNode
            enable_elastic_disk: true
            data_security_mode: SINGLE_USER
            runtime_engine: STANDARD
            num_workers: 0
      git_source:
        git_url: https://github.com/ourresearch/openalex-walden.git
        git_provider: gitHub
        git_branch: main
