resources:
  jobs:
    DOAJ:
      name: DOAJ Journals CSV
      email_notifications:
        on_failure:
          - casey@ourresearch.org
      trigger:
        pause_status: UNPAUSED
        periodic:
          interval: 1
          unit: DAYS
      tasks:
        - task_key: doaj_from_csv
          notebook_task:
            notebook_path: notebooks/sources/DOAJ Journals CSV
            source: GIT
      git_source:
        git_url: https://github.com/ourresearch/openalex-walden.git
        git_provider: gitHub
        git_branch: main
      queue:
        enabled: true
      run_as:
        service_principal_name: 736e2b72-37fd-4cbd-9313-0e68514ab813
      performance_target: PERFORMANCE_OPTIMIZED
