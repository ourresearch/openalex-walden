resources:
  jobs:
    Works_Daily_Metrics:
      name: Works Daily Metrics
      description: |
        Daily coverage/health metrics over openalex.works.openalex_works,
        appended (tall format) to openalex.works.works_daily_metrics.
        First run auto-backfills the prior 30 days via Delta time travel
        (set backfill_days to re-run a window manually).
      email_notifications:
        on_failure:
          - casey@ourresearch.org
      schedule:
        # 22:00 UTC. end2end starts at 05:00 UTC and runs ~5-13h (clusters around
        # 16:00-17:30 lately), so 22:00 leaves a buffer for the live works table to
        # finish the day's rebuild before we snapshot its metrics. NOTE: this is a
        # fixed-clock standalone schedule, NOT gated on end2end — on rare overrun
        # days (end2end finishing >22:00 / next day) this row may reflect a
        # mid-refresh or prior-day table. Writes are idempotent per snapshot_date,
        # so just re-run that date manually to correct it.
        quartz_cron_expression: 0 0 22 * * ?
        timezone_id: UTC
        pause_status: UNPAUSED
      parameters:
        - name: snapshot_date
          default: "{{job.start_time.iso_date}}"
        - name: backfill_days
          default: ""
      tasks:
        - task_key: works_daily_metrics
          notebook_task:
            notebook_path: notebooks/metrics/WorksDailyMetrics
            source: GIT
          job_cluster_key: metrics-cluster
      job_clusters:
        - job_cluster_key: metrics-cluster
          new_cluster:
            # Full scan of openalex_works (~510M works) reading the nested
            # authorships column once per snapshot. m5d.2xlarge gives NVMe at
            # /local_disk0 for cheap shuffle/cache spill; Photon speeds the
            # aggregates. Daily run = 1 scan (~minutes); first-run 30-day
            # backfill = ~30 scans (one-time, longer).
            spark_version: 16.4.x-scala2.12
            node_type_id: m5d.2xlarge
            num_workers: 4
            runtime_engine: PHOTON
            aws_attributes:
              availability: ON_DEMAND
              zone_id: auto
              ebs_volume_type: GENERAL_PURPOSE_SSD
              ebs_volume_count: 1
              ebs_volume_size: 64
            data_security_mode: SINGLE_USER
      git_source:
        git_url: https://github.com/ourresearch/openalex-walden.git
        git_provider: gitHub
        git_branch: main
      queue:
        enabled: true
      performance_target: STANDARD
