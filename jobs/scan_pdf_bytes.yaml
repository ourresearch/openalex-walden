resources:
  jobs:
    Scan_PDF_Bytes:
      name: Scan PDF Bytes in R2
      description: |
        Classifies the first 1024 bytes of every pdf_s3_id in locations_mapped
        to identify invalid PDFs (HTML / gzipped landing pages / error text)
        stored in the openalex-pdfs R2 bucket. Output: openalex.works.pdf_byte_classification[_suffix].

        One-shot (PAUSED). Trigger manually.

        Defaults are sized for the full 64.9M scan on 64 m5d.2xlarge workers
        (sample_limit=0, num_partitions=4096). Expected runtime ~2.5–3 hr at
        ~7K rows/s aggregate; ~$280 in compute. Reduce num_workers in the UI
        to 4 + override sample_limit=100000 + target_suffix=_pilot for a
        quick pilot before kicking off the full run.
      email_notifications:
        on_failure:
          - casey@ourresearch.org
      schedule:
        quartz_cron_expression: 0 0 4 * * ?
        timezone_id: UTC
        pause_status: PAUSED
      parameters:
        - name: sample_limit
          default: "0"
        - name: target_suffix
          default: ""
        - name: num_partitions
          default: "4096"
      tasks:
        - task_key: scan_pdf_bytes
          notebook_task:
            notebook_path: notebooks/scraping/scan_pdf_bytes
            source: GIT
            base_parameters:
              sample_limit: "{{job.parameters.sample_limit}}"
              target_suffix: "{{job.parameters.target_suffix}}"
              num_partitions: "{{job.parameters.num_partitions}}"
          job_cluster_key: scan-pdf-cluster
      job_clusters:
        - job_cluster_key: scan-pdf-cluster
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: m5d.2xlarge
            num_workers: 64
            runtime_engine: PHOTON
            aws_attributes:
              availability: ON_DEMAND
              zone_id: auto
              ebs_volume_type: GENERAL_PURPOSE_SSD
              ebs_volume_count: 1
              ebs_volume_size: 32
            data_security_mode: SINGLE_USER
      git_source:
        git_url: https://github.com/ourresearch/openalex-walden.git
        git_provider: gitHub
        git_branch: main
      queue:
        enabled: true
      performance_target: STANDARD
