resources:
  jobs:
    Create_Invalid_Grobids:
      name: Create + Seed openalex.pdf.invalid_grobids (#202 Track 2)
      description: |
        Seeds openalex.pdf.invalid_grobids from openalex.works.grobid_xml_classification
        (the classifier output). Bad cohort = label != 'TEI_VALID'. ~8M expected.
        Idempotent MERGE on grobid_uuid.

        Run after Classify_Grobid_Xmls. Output feeds the PDF.py anti-join filter,
        the strip-from-pdf_works notebook, R2 delete, and D1 NULL-out.

        One-shot (PAUSED). Widgets: pilot_limit (0 = full), scan_run_id stamp.
      email_notifications:
        on_failure:
          - casey@ourresearch.org
      schedule:
        quartz_cron_expression: 0 0 8 * * ?
        timezone_id: UTC
        pause_status: PAUSED
      parameters:
        - name: pilot_limit
          default: "0"
        - name: scan_run_id
          default: "2026-05-21_union_v1"
      tasks:
        - task_key: create_invalid_grobids
          notebook_task:
            notebook_path: notebooks/scraping/create_invalid_grobids
            source: GIT
            base_parameters:
              pilot_limit: "{{job.parameters.pilot_limit}}"
              scan_run_id: "{{job.parameters.scan_run_id}}"
          job_cluster_key: seed-cluster
      job_clusters:
        - job_cluster_key: seed-cluster
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: m5d.2xlarge
            num_workers: 4
            runtime_engine: PHOTON
            aws_attributes:
              availability: ON_DEMAND
              zone_id: auto
              ebs_volume_type: GENERAL_PURPOSE_SSD
              ebs_volume_count: 1
              ebs_volume_size: 32
            data_security_mode: SINGLE_USER
      git_source:
        git_url: https://github.com/ourresearch/openalex-walden.git
        git_provider: gitHub
        git_branch: main
      queue:
        enabled: true
      performance_target: STANDARD
