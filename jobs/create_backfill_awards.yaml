resources:
  jobs:
    Create_Backfill_Awards:
      name: Create Backfill Awards
      run_as:
        user_name: richard@openalex.org
      # No schedule — mid.work_funder is a frozen legacy snapshot. This job
      # exists for on-demand re-materialization of `openalex.awards.backfill_awards`
      # and the `provenance='crossref_work.grants'` slice of openalex_awards_raw,
      # e.g. after the is_usable_award_id filter is tightened.
      tasks:
        - task_key: create_backfill_awards
          notebook_task:
            notebook_path: notebooks/awards/CreateBackfillAwards
            source: GIT
            warehouse_id: 3996dc0a9b183ce3
      git_source:
        git_url: https://github.com/ourresearch/openalex-walden.git
        git_provider: gitHub
        git_branch: main
      queue:
        enabled: true
