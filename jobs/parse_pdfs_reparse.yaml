resources:
  jobs:
    ParsePDFsReparse:
      name: Parse PDFs Reparse
      email_notifications:
        on_failure:
          - casey@ourresearch.org
      continuous:
        pause_status: UNPAUSED
      max_concurrent_runs: 1
      tasks:
        - task_key: run_parse_pdfs_reparse
          notebook_task:
            notebook_path: notebooks/parsing/parse_pdfs
            source: GIT
            base_parameters:
              reparse_queue_only: "true"
              batch_size: "250000"
          job_cluster_key: parse_pdfs_reparse_cluster
      job_clusters:
        - job_cluster_key: parse_pdfs_reparse_cluster
          new_cluster:
            cluster_name: ""
            spark_version: 16.4.x-scala2.13
            spark_conf:
              spark.master: local[*, 4]
              spark.databricks.cluster.profile: singleNode
            aws_attributes:
              first_on_demand: 1
              availability: SPOT_WITH_FALLBACK
              zone_id: us-east-1f
              spot_bid_price_percent: 100
            node_type_id: rd-fleet.8xlarge
            driver_node_type_id: rd-fleet.8xlarge
            custom_tags:
              ResourceClass: SingleNode
            enable_elastic_disk: true
            data_security_mode: SINGLE_USER
            runtime_engine: STANDARD
            num_workers: 0
      git_source:
        git_url: https://github.com/ourresearch/openalex-walden.git
        git_provider: gitHub
        git_branch: main
      parameters:
        - name: reparse_queue_only
          default: "true"
        - name: batch_size
          default: "250000"
