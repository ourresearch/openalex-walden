resources:
  jobs:
    Authors:
      name: Authors
      schedule:
        quartz_cron_expression: 36 0 12 * * ?
        timezone_id: UTC
        pause_status: UNPAUSED
      tasks:
        - task_key: Sync_Author_Name_Curations
          notebook_task:
            notebook_path: notebooks/authors/SyncAuthorNameCurations
            source: GIT
            warehouse_id: 3996dc0a9b183ce3
        - task_key: Apply_Author_Name_Curations
          depends_on:
            - task_key: Sync_Author_Name_Curations
          notebook_task:
            notebook_path: notebooks/authors/ApplyAuthorNameCurations
            source: GIT
            warehouse_id: 3996dc0a9b183ce3
        - task_key: Update_Author_Full_Names
          depends_on:
            - task_key: Sync_Author_Name_Curations
          notebook_task:
            notebook_path: notebooks/authors/UpdateAuthorFullNames
            source: GIT
            warehouse_id: 3996dc0a9b183ce3
        - task_key: Sync_Author_Orcid_Curations
          notebook_task:
            notebook_path: notebooks/authors/SyncAuthorOrcidCurations
            source: GIT
            warehouse_id: 3996dc0a9b183ce3
        - task_key: Apply_Author_Orcid_Curations
          depends_on:
            - task_key: Sync_Author_Orcid_Curations
          notebook_task:
            notebook_path: notebooks/authors/ApplyAuthorOrcidCurations
            source: GIT
            warehouse_id: 3996dc0a9b183ce3
        - task_key: Create_Authors
          depends_on:
            - task_key: Apply_Author_Name_Curations
            - task_key: Update_Author_Full_Names
            - task_key: Apply_Author_Orcid_Curations
          notebook_task:
            notebook_path: notebooks/authors/CreateAuthors
            source: GIT
            warehouse_id: 3996dc0a9b183ce3
      git_source:
        git_url: https://github.com/ourresearch/openalex-walden.git
        git_provider: gitHub
        git_branch: main
      queue:
        enabled: true
