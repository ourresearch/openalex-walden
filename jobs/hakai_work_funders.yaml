resources:
  jobs:
    Hakai_Work_Funders:
      name: Hakai Work Funders
      schedule:
        quartz_cron_expression: 0 30 1 * * ?
        timezone_id: UTC
        # PAUSED by design (OUTPUT-LIST pattern, §11): run ON-DEMAND, not on a schedule.
        # Hakai's published list (hakai.org/publications) is static and re-scraped rarely,
        # so a daily rebuild is wasted work. Trigger manually after a re-scrape
        # (hakai_outputs_to_s3.py), or occasionally to sweep up lagged works as OpenAlex
        # indexes them. The cron is retained only as a documented cadence.
        pause_status: PAUSED
      tasks:
        - task_key: create_hakai_work_funders
          notebook_task:
            notebook_path: notebooks/awards/CreateHakaiWorkFunders
            source: GIT
            warehouse_id: 3996dc0a9b183ce3
      git_source:
        git_url: https://github.com/ourresearch/openalex-walden.git
        git_provider: gitHub
        git_branch: main
      queue:
        enabled: true
