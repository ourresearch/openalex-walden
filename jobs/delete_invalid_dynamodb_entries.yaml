resources:
  jobs:
    Delete_Invalid_DynamoDB_Entries:
      name: Delete Invalid DynamoDB Entries (#185)
      description: |
        Deletes bad-cohort mappings from the taxicab DynamoDB tables in
        us-east-1: harvested-pdf and grobid-xml. Without this purge, stale
        entries for our bad cohort keep appearing in /taxicab/doi/... even
        though R2 bytes and D1 rows are already gone.

        Sources:
          - PDF ids: openalex.pdf.invalid_pdfs.source_pdf_id (one per row).
          - XML ids: pdf_works @ time-travel version (pre-strip), extract
            docs.parsed-pdf entries from victim rows, strip .xml.gz suffix.
            Delta default file retention is 7 days — run XMLs before the
            pre-strip version is vacuumed.

        One-shot (PAUSED). Trigger manually. Idempotent (DeleteItem on a
        non-existent key is a no-op).

        AWS auth: webscraper secret scope (same IAM identity as
        AWS_ACCESS_KEY_ID_OPENALEX_INGEST in walden's .env).

        Widgets — typical sequence:
          target=pdfs, dry_run=true,  sample_limit=0      # confirm ~2.97M
          target=pdfs, dry_run=false, sample_limit=1000   # 1K pilot
          target=pdfs, dry_run=false, sample_limit=0      # full PDFs
          target=xmls, dry_run=false, sample_limit=1000   # 1K pilot
          target=xmls, dry_run=false, sample_limit=0      # full XMLs

        Cluster mirrors delete_invalid_r2_objects (4× m5d.2xlarge + Photon).
      email_notifications:
        on_failure:
          - casey@ourresearch.org
      schedule:
        quartz_cron_expression: 0 0 5 * * ?
        timezone_id: UTC
        pause_status: PAUSED
      parameters:
        - name: target
          default: "pdfs"
        - name: dry_run
          default: "true"
        - name: sample_limit
          default: "0"
        - name: pdf_works_version
          default: "4224"
        - name: num_partitions
          default: "256"
        - name: threads_per_task
          default: "8"
      tasks:
        - task_key: delete_invalid_dynamodb_entries
          notebook_task:
            notebook_path: notebooks/scraping/delete_invalid_dynamodb_entries
            source: GIT
            base_parameters:
              target: "{{job.parameters.target}}"
              dry_run: "{{job.parameters.dry_run}}"
              sample_limit: "{{job.parameters.sample_limit}}"
              pdf_works_version: "{{job.parameters.pdf_works_version}}"
              num_partitions: "{{job.parameters.num_partitions}}"
              threads_per_task: "{{job.parameters.threads_per_task}}"
          job_cluster_key: ddb-delete-cluster
      job_clusters:
        - job_cluster_key: ddb-delete-cluster
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: m5d.2xlarge
            num_workers: 4
            runtime_engine: PHOTON
            aws_attributes:
              availability: ON_DEMAND
              zone_id: auto
              ebs_volume_type: GENERAL_PURPOSE_SSD
              ebs_volume_count: 1
              ebs_volume_size: 32
            data_security_mode: SINGLE_USER
      git_source:
        git_url: https://github.com/ourresearch/openalex-walden.git
        git_provider: gitHub
        git_branch: main
      queue:
        enabled: true
      performance_target: STANDARD
