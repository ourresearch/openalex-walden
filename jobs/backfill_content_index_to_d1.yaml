resources:
  jobs:
    Backfill_Content_Index_to_D1:
      name: Backfill Content Index to D1 (one-off catch-up)
      description: |
        One-off catch-up run for the Cloudflare D1 content index. Same notebook as the
        nightly Sync_Content_Index_to_D1 job, but parameterized to override sync_from
        and walk the window in date chunks. Trigger via "Run now"; no schedule.
      email_notifications:
        on_failure:
          - casey@ourresearch.org
      tasks:
        - task_key: backfill_content_index
          notebook_task:
            notebook_path: notebooks/elastic/sync_content_index_to_d1
            source: GIT
            base_parameters:
              # Last successful nightly run was 2026-01-21T21:21:24Z;
              # notebook subtracts a 2h buffer internally.
              sync_from_override: "2026-01-21T21:21:24Z"
              sync_to_override: ""
              chunk_days: "30"
              dry_run: "false"
          job_cluster_key: d1-backfill-cluster
      job_clusters:
        - job_cluster_key: d1-backfill-cluster
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: m5.xlarge
            num_workers: 0
            spark_conf:
              spark.master: "local[*, 4]"
              spark.databricks.cluster.profile: singleNode
            aws_attributes:
              availability: SPOT_WITH_FALLBACK
              zone_id: auto
              ebs_volume_type: GENERAL_PURPOSE_SSD
              ebs_volume_count: 1
              ebs_volume_size: 32
            custom_tags:
              ResourceClass: SingleNode
            data_security_mode: SINGLE_USER
      git_source:
        git_url: https://github.com/ourresearch/openalex-walden.git
        git_provider: gitHub
        git_branch: main
      queue:
        enabled: true
      performance_target: STANDARD
