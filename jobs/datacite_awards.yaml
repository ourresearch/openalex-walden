resources:
  pipelines:
    datacite_awards:
      name: DataCite Awards
      configuration:
        environment: prod
        "spark.sql.execution.arrow.maxRecordsPerBatch": "100"
      libraries:
        - notebook:
            path: ${workspace.file_path}/notebooks/awards/CreateDataCiteAwards
      schema: awards
      development: true
      photon: true
      catalog: openalex
      serverless: true
      permissions:
        - user_name: casey@ourresearch.org
          level: IS_OWNER
        - group_name: users
          level: CAN_MANAGE
      tags:
        environment: prod
