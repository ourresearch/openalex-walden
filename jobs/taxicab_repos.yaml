resources:
  jobs:
    TaxiCab_Repos:
      name: TaxiCab Repos
      email_notifications:
        on_failure:
          - casey@ourresearch.org
      schedule:
        quartz_cron_expression: 41 0 4/4 * * ?
        timezone_id: UTC
        pause_status: UNPAUSED
      max_concurrent_runs: 1
      queue:
        enabled: false
      tasks:
        - task_key: run_taxicab
          notebook_task:
            notebook_path: notebooks/scraping/taxicab
            source: GIT
            base_parameters:
              lookback_days: "3"
              url_limit: "500000"
              source_filter: "repo_only"
              # oxjob #542: skip the bulk ingested_at re-stamp from the 2026-06-30/07-01
              # repo_items full refresh (105M rows, max ingested_at 2026-07-01 12:37 UTC).
              # cutoff = max(now-lookback, ingested_after); SELF-DEACTIVATES ~2026-07-04
              # once the trailing window passes it, then inert. Safe to remove later.
              ingested_after: "2026-07-01T13:00:00"
          job_cluster_key: Taxicab_job_cluster
      job_clusters:
        - job_cluster_key: Taxicab_job_cluster
          new_cluster:
            cluster_name: ""
            spark_version: 16.4.x-scala2.13
            spark_conf:
              spark.master: local[*, 4]
              spark.databricks.cluster.profile: singleNode
            aws_attributes:
              first_on_demand: 1
              availability: SPOT_WITH_FALLBACK
              zone_id: us-east-1f
              spot_bid_price_percent: 100
            node_type_id: m5d.4xlarge
            driver_node_type_id: m5d.4xlarge
            custom_tags:
              ResourceClass: SingleNode
            enable_elastic_disk: true
            data_security_mode: SINGLE_USER
            runtime_engine: STANDARD
            num_workers: 0
      git_source:
        git_url: https://github.com/ourresearch/openalex-walden.git
        git_provider: gitHub
        git_branch: main
      parameters:
        - name: lookback_days
          default: "3"
        - name: url_limit
          default: "500000"
        - name: source_filter
          default: "repo_only"
        - name: ingested_after
          default: "2026-07-01T13:00:00"
