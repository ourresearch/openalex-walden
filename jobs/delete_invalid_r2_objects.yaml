resources:
  jobs:
    Delete_Invalid_R2_Objects:
      name: Delete Invalid R2 Objects (#185)
      description: |
        Deletes bad-cohort objects from R2 — the PDF bytes in openalex-pdfs
        and (optionally) the cascaded GROBID XMLs in openalex-content-xml.
        Pairs with the in-place pdf_works strip and the D1 cohort delete.

        Sources:
          - PDF keys: openalex.pdf.invalid_pdfs (one row per source_pdf_id).
          - XML keys: pdf_works @ time-travel version (pre-strip), extract
            docs.parsed-pdf entries from victim rows. Delta default file
            retention is 7 days — run XMLs before the pre-strip version is
            vacuumed.

        One-shot (PAUSED). Trigger manually. Idempotent (DELETE on a
        non-existent key is a no-op).

        Widgets — typical sequence:
          target=pdfs, dry_run=true,  sample_limit=0      # confirm ~2.97M
          target=pdfs, dry_run=false, sample_limit=10000  # 10K pilot
          target=pdfs, dry_run=false, sample_limit=0      # full PDFs
          target=xmls, dry_run=false, sample_limit=0      # full XMLs

        Cluster mirrors scan_pdf_bytes (4× m5d.2xlarge + Photon). DELETE is
        lighter than scan; can be reduced for small pilots from the UI.
      email_notifications:
        on_failure:
          - casey@ourresearch.org
      schedule:
        quartz_cron_expression: 0 0 5 * * ?
        timezone_id: UTC
        pause_status: PAUSED
      parameters:
        - name: target
          default: "pdfs"
        - name: dry_run
          default: "true"
        - name: sample_limit
          default: "0"
        - name: pdf_works_version
          default: "4224"
        - name: num_partitions
          default: "256"
        - name: threads_per_task
          default: "16"
      tasks:
        - task_key: delete_invalid_r2_objects
          notebook_task:
            notebook_path: notebooks/scraping/delete_invalid_r2_objects
            source: GIT
            base_parameters:
              target: "{{job.parameters.target}}"
              dry_run: "{{job.parameters.dry_run}}"
              sample_limit: "{{job.parameters.sample_limit}}"
              pdf_works_version: "{{job.parameters.pdf_works_version}}"
              num_partitions: "{{job.parameters.num_partitions}}"
              threads_per_task: "{{job.parameters.threads_per_task}}"
          job_cluster_key: r2-delete-cluster
      job_clusters:
        - job_cluster_key: r2-delete-cluster
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: m5d.2xlarge
            num_workers: 4
            runtime_engine: PHOTON
            aws_attributes:
              availability: ON_DEMAND
              zone_id: auto
              ebs_volume_type: GENERAL_PURPOSE_SSD
              ebs_volume_count: 1
              ebs_volume_size: 32
            data_security_mode: SINGLE_USER
      git_source:
        git_url: https://github.com/ourresearch/openalex-walden.git
        git_provider: gitHub
        git_branch: main
      queue:
        enabled: true
      performance_target: STANDARD
