resources:
  jobs:
    DataCite_Work_Funders:
      name: DataCite Work Funders
      schedule:
        # Run alongside the other work-funder feeds so RefreshWorkAwards at 03:00 UTC
        # picks up our table on the same day. NWO/Hakai at 01:30, Crossref at 02:00.
        quartz_cron_expression: 0 0 2 * * ?
        timezone_id: UTC
        pause_status: UNPAUSED
      tasks:
        - task_key: create_datacite_work_funders
          notebook_task:
            notebook_path: notebooks/awards/CreateDataCiteWorkFunders
            source: GIT
            warehouse_id: 3996dc0a9b183ce3
      git_source:
        git_url: https://github.com/ourresearch/openalex-walden.git
        git_provider: gitHub
        git_branch: main
      queue:
        enabled: true
