resources:
  jobs:
    Expunge_Deletes_Works:
      name: Expunge Deletes - Works Elasticsearch
      email_notifications:
        on_failure:
          - casey@ourresearch.org
      schedule:
        quartz_cron_expression: 0 0 1 ? * THU
        timezone_id: UTC
        pause_status: UNPAUSED
      tasks:
        - task_key: expunge_deletes
          job_cluster_key: maintenance_cluster
          notebook_task:
            notebook_path: notebooks/maintenance/expunge_elasticsearch_deletes
            source: GIT
            base_parameters:
              index_name: works-v33
              delete_threshold_pct: "15"
              max_disk_pct: "80"
              bulk_wait_minutes: "60"
              max_runtime_hours: "24"
              poll_interval_seconds: "300"
          timeout_seconds: 100800
      job_clusters:
        - job_cluster_key: maintenance_cluster
          new_cluster:
            cluster_name: ""
            spark_version: 16.4.x-scala2.13
            spark_conf:
              spark.master: local[*, 4]
              spark.databricks.cluster.profile: singleNode
            aws_attributes:
              availability: ON_DEMAND
            node_type_id: m5d.xlarge
            driver_node_type_id: m5d.xlarge
            custom_tags:
              ResourceClass: SingleNode
            spark_env_vars:
              PYSPARK_PYTHON: /databricks/python3/bin/python3
            data_security_mode: SINGLE_USER
            runtime_engine: STANDARD
            num_workers: 0
      git_source:
        git_url: https://github.com/ourresearch/openalex-walden.git
        git_provider: gitHub
        git_branch: main
      queue:
        enabled: true
      performance_target: STANDARD
